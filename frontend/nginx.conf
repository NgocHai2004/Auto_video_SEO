server {
    listen 80;
    server_name _;

    # Use Docker's internal DNS resolver
    resolver 127.0.0.11 valid=10s;

    # Serve frontend static files
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend
    location /api/ {
        # Use variable to prevent nginx from crashing if backend is not yet available
        set $backend_upstream http://backend:5000;
        proxy_pass $backend_upstream;
        rewrite ^/api/(.*) /$1 break;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support (disable buffering for streaming responses)
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        chunked_transfer_encoding off;

        # Increase timeouts for long pipeline operations (video gen can take 10+ min)
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
        proxy_connect_timeout 60s;
    }

    # Increase max upload size for images/files
    client_max_body_size 100M;
}
